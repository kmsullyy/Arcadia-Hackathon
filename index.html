<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Essential SEO & Meta Settings -->
    <title>Arcadia Commuter Assistant</title>
    <meta name="description" content="A premium utility application to help Arcadia University students determine when to leave for class based on traffic and class cancellations.">
    <!-- Connect our Design System -->
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="container container-sm" style="padding-top: 4rem;">
        
        <!-- Header -->
        <header class="text-center mb-lg">
            <h1 style="font-size: var(--text-4xl); margin-bottom: var(--space-sm);">
                Good Morning, <span class="text-brand">Student</span>
            </h1>
            <p class="text-muted" style="font-size: var(--text-lg);">Here's your commute outlook for today.</p>
        </header>

        <!-- Status Card (Glassmorphism) -->
        <div class="card-glass mb-lg" style="text-align: center;">
            <div style="display: flex; justify-content: center; align-items: center; gap: var(--space-sm); margin-bottom: var(--space-sm);">
                <!-- Animated pulsing dot indicator -->
                <div style="width: 12px; height: 12px; background-color: var(--success-main); border-radius: 50%;" class="animate-pulse-soft"></div>
                <span class="text-success" style="font-weight: 600; font-family: var(--font-heading); letter-spacing: 0.5px;">ON TIME</span>
            </div>
            
            <h2 style="font-size: var(--text-5xl); margin-bottom: var(--space-xs);">
                Leave in <span class="text-brand">15m</span>
            </h2>
            <p class="text-muted" style="margin-bottom: var(--space-lg);">Traffic is light on Route 309</p>
            
            <button class="btn-primary" style="width: 100%;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                Launch Navigation
            </button>
        </div>

        <!-- Schedule Preview -->
        <div>
            <h3 style="font-size: var(--text-xl); margin-bottom: var(--space-md);">Up Next</h3>
            
            <!-- Individual Class Card -->
            <div class="card-glass" style="padding: var(--space-md); margin-bottom: var(--space-sm); display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h4 style="font-size: var(--text-lg);">CS 301 - Data Structures</h4>
                    <p class="text-muted text-sm">Taylor Hall 204</p>
                </div>
                <div style="text-align: right;">
                    <strong style="font-family: var(--font-heading);">10:00 AM</strong>
                    <p class="text-xs text-muted">In 45 mins</p>
                </div>
            </div>

            <!-- Cancelled Class Card -->
            <div class="card-glass" style="padding: var(--space-md); border-left: 4px solid var(--danger-main); opacity: 0.7;">
                <div class="flex justify-between items-center">
                    <div>
                        <h4 style="font-size: var(--text-lg); text-decoration: line-through;">MATH 210 - Linear Algebra</h4>
                        <p class="text-danger text-sm" style="font-weight: 600;">CLASS CANCELLED</p>
                    </div>
                    <div style="text-align: right; text-decoration: line-through;">
                        <strong style="font-family: var(--font-heading);">1:00 PM</strong>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Check for OS/System theme preference and apply seamlessly if unhandled
        const prefersDarkScheme = window.matchMedia("(prefers-color-scheme: dark)");

        // Initial setup for any dynamic theme-toggling logic we add later
        console.log("Design system loaded successfully.");
    </script>
</body>
</html>
