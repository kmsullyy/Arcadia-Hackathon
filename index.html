<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcadia Commuter Assistant</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="app-container">
        
        <!-- Top Text -->
        <header class="app-header">
            <h1 class="sketchy-text">Welcome, user!</h1>
        </header>

        <!-- Main Dashboard View -->
        <main class="main-content">
            
            <!-- Red Class @ Time Box -->
            <div class="red-class-card">
                <h2>Class @ <br> Time</h2>
                <div class="card-location">
                    <span class="sketchy-text">Location</span>
                </div>
            </div>

            <!-- Castle Image (Positioned to the right of the red block) -->
            <div class="castle-container">
                <!-- User can replace this with their castle image in Public/Images -->
                <img src="Public/Images/castle.jpg" alt="Castle" class="castle-img" onerror="this.style.display='none'; this.parentElement.classList.add('no-image'); this.parentElement.innerHTML='<div style=\'padding: 10px;\'>Castle Image Here<br><br><small>Drop your image in Public/Images/castle.jpg</small></div>';">
            </div>

        </main>

        <!-- The Road and Car Animation -->
        <div class="road-scene">
            <!-- The Car -->
            <div class="car-container">
                <!-- Premium SVG of a red semi-realistic/modern cute car -->
                <svg class="car-svg" viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
                    <!-- Wheels (Back background) -->
                    <circle cx="20" cy="40" r="8" fill="#111" />
                    <circle cx="80" cy="40" r="8" fill="#111" />
                    
                    <!-- Car Body Bottom -->
                    <rect x="10" y="25" width="80" height="15" rx="5" fill="#e11d48" />
                    
                    <!-- Car Body Top (Cabin) -->
                    <path d="M 25 25 L 35 10 L 65 10 L 80 25 Z" fill="#e11d48" />
                    
                    <!-- Windows -->
                    <path d="M 35 12 L 48 12 L 48 25 L 29 25 Z" fill="#bae6fd" />
                    <path d="M 52 12 L 63 12 L 75 25 L 52 25 Z" fill="#bae6fd" />
                    
                    <!-- Headlight / Taillight -->
                    <path d="M 85 28 L 90 28 Q 90 32 85 32 Z" fill="#facc15" /> <!-- Headlight -->
                    <rect x="10" y="28" width="3" height="5" fill="#fca5a5" /> <!-- Taillight -->

                    <!-- Front Wheels (Foreground) -->
                    <circle cx="20" cy="40" r="7" fill="#333" stroke="#94a3b8" stroke-width="2" />
                    <circle cx="80" cy="40" r="7" fill="#333" stroke="#94a3b8" stroke-width="2" />
                    <circle cx="20" cy="40" r="2" fill="#cbd5e1" />
                    <circle cx="80" cy="40" r="2" fill="#cbd5e1" />
                </svg>
            </div>
            
            <!-- Road with moving dash line -->
            <div class="road">
                <div class="road-lines"></div>
            </div>
        </div>

        <!-- Bottom Navigation Bar -->
        <nav class="bottom-nav">
            <!-- Alerts Icon -->
            <a href="#" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <span class="nav-label sketchy-text">Alerts</span>
            </a>
            
            <!-- Account Icon -->
            <a href="#" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span class="nav-label sketchy-text">Account</span>
            </a>
            
            <!-- Settings Icon -->
            <a href="#" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
                <span class="nav-label sketchy-text">Settings</span>
            </a>
        </nav>
        
    </div>
</body>
</html>
